# Full stack — one command, one URL: http://localhost:8080
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sosta
      POSTGRES_PASSWORD: sosta
      POSTGRES_DB: sosta_bazar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sosta -d sosta_bazar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../sosta-bazar-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://sosta:sosta@postgres:5432/sosta_bazar
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../sosta-bazar-api
      dockerfile: Dockerfile
    command: celery -A worker.celery_app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://sosta:sosta@postgres:5432/sosta_bazar
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    shm_size: "2gb"

  beat:
    build:
      context: ../sosta-bazar-api
      dockerfile: Dockerfile
    command: celery -A worker.celery_app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://sosta:sosta@postgres:5432/sosta_bazar
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - worker

  web:
    build:
      context: ../sosta-bazar-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    environment:
      INTERNAL_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
