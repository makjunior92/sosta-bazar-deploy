events {
  worker_connections 1024;
}

http {
  upstream web {
    server web:3000;
  }

  upstream api {
    server api:8000;
  }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_buffering off;
    }

    location /openapi.json {
      proxy_pass http://api;
    }

    location /health {
      proxy_pass http://api;
    }

    location /docs {
      proxy_pass http://api;
    }

    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
